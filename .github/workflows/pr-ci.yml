name: PR CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pr-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm exec nx run portfolio:lint

      - name: Unit tests
        run: npm exec nx run portfolio:test

      - name: Build
        run: npm exec nx run portfolio:build:development

      - name: E2E tests
        run: npm exec nx run portfolio-e2e:e2e
