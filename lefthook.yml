pre-commit:
  parallel: false
  commands:
    format:
      glob: '*.{js,mjs,cjs,ts,html,json,css,scss,md,yml,yaml}'
      run: npx prettier --write {staged_files}
      stage_fixed: true
      fail_text: 'Prettier formatting failed. Review the output above and fix any issues.'
    lint:
      glob: '*.{js,mjs,cjs,ts,html}'
      run: npx eslint --fix {staged_files}
      stage_fixed: true
      fail_text: 'ESLint found issues that could not be auto-fixed. Fix them before committing.'

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}
      fail_text: 'Commit message does not follow the Conventional Commits specification. See .github/guidelines/commit-convention.md.'

pre-push:
  parallel: false
  commands:
    branch-name:
      run: >
        node -e "
          const {execSync} = require('child_process');
          const branch = execSync('git rev-parse --abbrev-ref HEAD').toString().trim();
          const pattern = /^(main|develop|feature\/[a-z0-9._-]+|fix\/[a-z0-9._-]+|hotfix\/[a-z0-9._-]+|release\/[a-z0-9._-]+|chore\/[a-z0-9._-]+|docs\/[a-z0-9._-]+)$/;
          if (!pattern.test(branch)) {
            console.error('ERROR: Branch name \"' + branch + '\" does not match allowed patterns.');
            console.error('Allowed: main, develop, feature/<slug>, fix/<slug>, hotfix/<slug>, release/<slug>, chore/<slug>, docs/<slug>');
            console.error('Slug regex: [a-z0-9._-]+');
            process.exit(1);
          }
        "
      fail_text: 'Push rejected: branch name does not match the allowed naming convention.'
    lint:
      run: npx nx run-many --target=lint
      fail_text: 'Push rejected: lint errors found. Fix all lint issues before pushing.'
    build:
      run: npx nx run-many --target=build
      fail_text: 'Push rejected: build failed. Fix all build errors before pushing.'
